<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel | Laboratory Archive</title>
    <meta name="description" content="旅行の記録と日本地図">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Noto+Sans+JP:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <nav class="nav">
                <ul>
                    <li><a href="index.html#profile">Profile</a></li>
                    <li><a href="index.html#skills">Skills</a></li>
                    <li><a href="index.html#favorites">Favorites</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <section class="section">
            <div class="container animate-on-scroll">
                <h2 class="section-title">Travel Archive</h2>
                <p style="margin-bottom: 2rem; color: var(--color-text-muted);">
                    これまでに訪れた場所の記録。地図上の色がついている県をクリックすると、エピソードが表示されます。
                </p>

                <div class="map-container">
                    <div class="map-svg-area" id="map-area">
                        <!-- SVG Map will be generated by map.js -->
                    </div>
                    
                    <div class="map-info-area" id="info-area">
                        <div class="map-info-placeholder" id="info-placeholder">
                            地図上の県を選択してください。
                        </div>
                        <div id="info-content" style="display: none;">
                            <h3 class="episode-title" id="episode-pref-name"></h3>
                            <p class="card-text" id="episode-text"></p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Taro Joho. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
    <script src="map.js"></script>
</body>
</html>
