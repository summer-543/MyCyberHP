<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- ドキュメント設定とメタ情報 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel | Laboratory Archive</title>
    <meta name="description" content="旅行の記録と日本地図">
    <!-- 外部フォントとスタイルシートの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- サイバースタイルの背景装飾要素 -->
    <div id="cyber-bg" class="cyber-bg"></div>

    <!-- ページ上部のナビゲーションヘッダー -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <ul>
                    <li><a href="index.html#profile">Profile</a></li>
                    <li><a href="index.html#research">Research</a></li>
                    <li><a href="index.html#skills">Skills</a></li>
                    <li><a href="index.html#projects">Projects</a></li>
                    <li><a href="index.html#favorites">Favorites</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <!-- 戻るボタンのエリア -->
        <div class="container">
            <div class="back-btn-container">
                <a href="index.html#favorites" class="back-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" />
                    </svg>
                    <span>Return to Database</span>
                </a>
            </div>
        </div>

        <!-- 旅行アーカイブセクション：日本地図とエピソード表示 -->
        <section class="section">
            <div class="container animate-on-scroll">
                <div class="hud-panel">
                <h2 class="section-title">Travel Archive</h2>
                <p style="margin-bottom: 2rem; color: var(--color-text-muted);">
                    これまでに訪れた場所の記録。地図上の県をクリックすると、エピソードが表示されます。
                </p>

                <!-- 地図と情報表示のレイアウトコンテナ -->
                <div class="map-container">
                    <!-- JavaScriptで地図が生成されるエリア -->
                    <div class="map-svg-area" id="map-area">
                        <!-- SVG Map will be generated by map.js -->
                    </div>
                    
                    <!-- 選択された県の情報を表示するエリア -->
                    <div class="map-info-area" id="info-area">
                        <div class="map-info-placeholder" id="info-placeholder">
                            地図上の県を選択してください。
                        </div>
                        <!-- 情報が表示される際のコンテンツブロック -->
                        <div id="info-content" style="display: none;">
                            <h3 class="episode-title" id="episode-pref-name"></h3>
                            <p class="card-text" id="episode-text"></p>
                        </div>
                    </div>
                </div>
                </div>
            </div>
        </section>
    </main>

    <!-- ページ下部のフッター -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 Sei Ooe. All rights reserved.</p>
        </div>
    </footer>

    <!-- スクリプトファイルの読み込み -->
    <script src="js/script.js"></script>
    <script src="js/map.js"></script>
</body>
</html>
