<!DOCTYPE html>
<html lang="ja">
<head>
    <!-- ドキュメント設定とメタ情報 -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>Travel | Laboratory Archive</title>
    <meta name="description" content="旅行の記録と日本地図">
    <!-- 外部フォントとスタイルシートの読み込み -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Share+Tech+Mono&family=Noto+Sans+JP:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile.css">
</head>
<body>
    <!-- サイバースタイルの背景装飾要素 -->
    <div id="cyber-bg" class="cyber-bg"></div>

    <!-- ページ上部のナビゲーションヘッダー -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <ul>
                    <li><a href="index.html#profile">Profile</a></li>
                    <li><a href="index.html#research">Research</a></li>
                    <li><a href="index.html#skills">Skills</a></li>
                    <li><a href="index.html#projects">Projects</a></li>
                    <li><a href="index.html#favorites" class="active">Favorites</a></li>
                    <li><a href="index.html#contact">Contact</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="main-content">
        <!-- 戻るボタンのエリア -->
        <div class="container">
            <div class="back-btn-container">
                <a href="index.html#favorites" class="back-btn">
                    <svg viewBox="0 0 24 24">
                        <path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z" />
                    </svg>
                    <span>Return to Database</span>
                </a>
            </div>
        </div>

        <!-- 旅行アーカイブセクション：日本地図とエピソード表示 -->
        <section class="section">
            <div class="container animate-on-scroll">
                <div class="hud-panel">
                <h2 class="section-title">Travel Archive</h2>

                <div id="travel-list" class="travel-list">
                    <!-- JavaScriptでエピソードカードが生成されます -->
                </div>
                </div>
            </div>
        </section>
        <!-- ページ下部のフッター -->
        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 Sei Ooe. All rights reserved.</p>
            </div>
        </footer>
        <!-- 画像拡大表示用モーダル -->
        <div id="image-modal" class="image-modal">
            <span class="close-modal">&times;</span>
            <img class="modal-content" id="modal-img">
            <div id="caption"></div>
        </div>
    </main>

    <!-- スクリプトファイルの読み込み -->
    <script src="js/script.js"></script>
    <script src="js/travel.js"></script>
</body>
</html>
